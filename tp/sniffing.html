<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nebby: Sniffing</title>
<style>
  /* в”Ђв”Ђ theme variables в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */

  :root {
    --bg:                #000000;
    --fg:                #ffffff;
    --bar-bg:            #000000;
    --bar-border:        #000000;
    --h1-label:          #ffffff;
    --input-bg:          #000000;
    --input-border:      #303030;
    --input-focus:       gray;
    --btn-border:        gray;
    --status-color:      gray;
    --th-color:          #ffffff;
    --th-border:         #303030;
    --th-bg:             #000000;
    --tr-border:         #303030;
    --tr-hover:          #303030;
    --idx-color:         gray;
    --int-empty:         #505050;
    --meta-color:        gray;
    --dist-color:        #7fb3d3;
    --text-color:        #ffffff;
    --empty-color:       gray;
    --marker-color:      gray;
    --noresults-color:   #303030;
    --toggle-color:      gray;
  }

  body.light {
    --bg:                #f5f5f0;
    --fg:                #111111;
    --bar-bg:            #f5f5f0;
    --bar-border:        #ddd;
    --h1-label:          gray;
    --input-bg:          #f5f5f0;
    --input-border:      gray;
    --input-focus:       black;
    --btn-border:        #888;
    --status-color:      #888;
    --th-color:          black;
    --th-border:         #ddd;
    --th-bg:             #f5f5f0;
    --tr-border:         #eee;
    --tr-hover:          #eeede8;
    --idx-color:         gray;
    --int-empty:         #ddd;
    --meta-color:        gray;
    --dist-color:        #2980b9;
    --text-color:        #333;
    --empty-color:       gray;
    --marker-color:      gray;
    --noresults-color:   gray;
    --toggle-color:      gray;
  }

  /* в”Ђв”Ђ base в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family:sans-serif;
    /* font-family: 'Courier New', Courier, monospace; */
    font-size: 14px;
    line-height: 1.6;
    padding: 0 0 4rem;
  }

  /* в”Ђв”Ђ fixed top bar в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */

  #top-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: var(--bar-bg);
    z-index: 10;
    padding: 1.2rem 2rem 0.8rem;
    border-bottom: 1px solid var(--bar-border);
  }

  #top-bar-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 0.8rem;
  }

  #top-bar-head-right {
    display: flex;
    align-items: baseline;
    gap: 1.2rem;
  }

  h1 {
    font-size: 1.14em;  /* 1rem Г— (16Г·14): slightly above body base */
    font-weight: normal;
    color: var(--h1-label);
    letter-spacing: 0.05em;
  }

  h1 span { color: var(--fg); }

  #view-toggle {
    background: none;
    border: none;
    color: var(--fg);
    font-family: inherit;
    font-size: 1em;     /* 1em relative to h1 (1.14emГ—14px в‰€ 16px) */
    font-weight: normal;
    letter-spacing: 0.05em;
    cursor: pointer;
    padding: 0;
  }
  #view-toggle:hover { opacity: 0.55; }

  #theme-toggle {
    background: none;
    border: none;
    color: var(--toggle-color);
    font-family: inherit;
    font-size: 0.91em;  /* 0.8rem Г— (16Г·14) */
    cursor: pointer;
    padding: 0;
    letter-spacing: 0.05em;
  }

  #theme-toggle:hover { color: var(--fg); }

  #location-form {
    display: flex;
    gap: 0.5rem;
    flex-shrink: 0;
  }

  #location-form input {
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--fg);
    font-family: inherit;
    font-size: inherit;
    padding: 0.25rem 0.6rem;
    outline: none;
  }

  #location-form input:focus { border-color: var(--input-focus); }
  #zip-input { width: 5rem; }
  #streets-input { width: 14rem; }

  #location-form button {
    background: none;
    border: 1px solid var(--btn-border);
    color: var(--fg);
    font-family: inherit;
    font-size: inherit;
    padding: 0.25rem 0.8rem;
    cursor: pointer;
  }

  #location-form button:hover { border-color: var(--fg); }

  /* в”Ђв”Ђ status with inline time select в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */

  #status {
    color: var(--status-color);
    font-size: 0.94em;  /* 0.82rem Г— (16Г·14) */
    margin-bottom: 0.5rem;
    min-height: 1.1em;
  }

  #status.error { color: #c0392b; }

  #time-select {
    background: none;
    border: 1px var(--input-border) solid;
    color: var(--status-color);
    font-family: inherit;
    font-size: inherit; /* matches parent #status (0.94em) */
    cursor: pointer;
    padding: 0.25em;
    margin-left: 0.1rem;
    outline: none;
    appearance: auto;
    display: none;
  }
  #time-select:focus { outline:none }

  #status-sep { display: none; }

  #controls-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.4rem;
  }

  #search-wrap {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex: 1;
  }

  #search-input {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--fg);
    font-family: inherit;
    font-size: 0.94em;  /* 0.82rem Г— (16Г·14) */
    padding: 0.25rem 0.6rem;
    outline: none;
  }
  #search-input:focus { border-color: var(--input-focus); }
  #search-input::placeholder { color: var(--status-color); }

  #clear-btn {
    background: none;
    border: none;
    color: var(--status-color);
    font-family: inherit;
    font-size: 0.89em;
    cursor: pointer;
    padding: 0;
    white-space: nowrap;
    display: none;
  }
  #clear-btn:hover { color: var(--fg); }

  mark {
    background: var(--tr-hover);
    color: inherit;
    border-radius: 2px;
  }

  /* в”Ђв”Ђ table в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */

  #table-wrap {
    margin-top: var(--bar-height, 10rem);
    overflow-x: clip;
  }

  #report-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  #report-table col.col-idx   { width: 2.8rem; }
  #report-table col.col-int   { width: 4rem; }
  #report-table col.col-meta  { width: 9rem; }
  #report-table col.col-desc  { width: 22%; }
  #report-table col.col-sym   { width: 22%; }
  #report-table col.col-com   { width: 22%; }
  #report-table col.col-dist  { width: 5rem; }

  #report-table thead th {
    text-align: left;
    font-size: 0.82em;  /* 0.72rem Г— (16Г·14) */
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--th-color);
    padding: 0.5rem 1rem;
    box-shadow: inset 0 -2px 0 var(--th-border);
    font-weight: normal;
    position: sticky;
    top: var(--bar-height, 0);
    background: var(--th-bg);
    transition: opacity 0.15s, color 0.15s;
    z-index: 12;
  }

  #report-table thead th[data-filter],
  #report-table thead th[data-sort]   { cursor: pointer; }
  #report-table thead th[data-filter]:hover,
  #report-table thead th[data-sort]:hover   { color: var(--fg); }

  th[data-sort="score"].sort-active::after { content: ' в†“'; font-size: 0.9em;   /* 0.65rem Г— (16Г·11.5): relative to th's own reduced size */ opacity: 0.7; }
  th[data-sort="dist"].sort-active::after  { content: ' в†‘'; font-size: 0.9em;   /* 0.65rem Г— (16Г·11.5): relative to th's own reduced size */ opacity: 0.7; }

  #report-table tbody tr { border-bottom: 1px solid var(--tr-border); }
  #report-table tbody tr:hover { background: var(--tr-hover); }

  #report-table tbody td {
    padding: 0.5rem 1rem;
    vertical-align: top;
    transition: opacity 0.15s;
  }

  .cell-idx  { color: var(--idx-color); font-size: 0.91em;  /* 0.8rem Г— (16Г·14) */ }
  .cell-int  { letter-spacing: -1px; white-space: nowrap; }
  .cell-int .empty { color: var(--int-empty); }

  td[data-score="1"] .cell-int { color: #27ae60; }
  td[data-score="2"] .cell-int { color: #c8b800; }
  td[data-score="3"] .cell-int { color: #e67e22; }
  td[data-score="4"] .cell-int { color: #c0392b; }
  td[data-score="5"] .cell-int { color: #7b0000; }
  .cell-meta { color: var(--meta-color); font-size: 0.89em;  /* 0.78rem Г— (16Г·14) */ white-space: nowrap; }
  .cell-dist { color: var(--dist-color); font-size: 0.89em;  /* 0.78rem Г— (16Г·14) */ white-space: nowrap; }

  .cell-text {
    max-height: 6em;
    overflow-y: auto;
    color: var(--text-color);
    font-size: 1em;     /* 0.88rem Г— (16Г·14) в‰€ 1 */
    scrollbar-width: thin;
    scrollbar-color: var(--input-border) transparent;
  }

  .cell-empty  { color: var(--empty-color); }
  .sent-marker { color: var(--marker-color); margin-left: 0.3rem; font-size: 0.88em;  /* 0.7rem Г— (16Г·14) Г· 0.91 (relative to .cell-idx) */ }

  /* в”Ђв”Ђ column dimming в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */

  #report-table.dim-comments    td.col-com,
  #report-table.dim-comments    th.col-com  { opacity: 0.30; }
  #report-table.dim-description td.col-desc,
  #report-table.dim-description th.col-desc { opacity: 0.30; }
  #report-table.dim-symptoms    td.col-sym,
  #report-table.dim-symptoms    th.col-sym  { opacity: 0.30; }

  /* dist column hidden until toggled on; th stays visible as the toggle target */
  #report-table:not(.dist-visible) td.col-dist { display: none; }

  #no-results {
    color: var(--noresults-color);
    padding: 2rem;
    display: none;
  }

  /* в”Ђв”Ђ random card overlay в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */

  #random-card {
    display: none;
    position: fixed;
    top: var(--bar-height, 10rem);
    left: 0; right: 0; bottom: 0;
    background: var(--bg);
    z-index: 9;
    overflow-y: auto;
    padding: 3rem 2rem;
    align-items: flex-start;
    justify-content: center;
  }

  #random-card.active { display: flex; }

  #random-inner {
    width: 100%;
    display:flex;
    flex-direction:column;
  }

  /* random-another, random-info, random-maintext */

  #random-info {
    margin-top: 3em;
    margin-bottom: 1em;
  }

  .rfield {
    display:flex;
    flex-direction: column;
    margin-bottom: 2em;
  }

  .rfield-label {
    color: var(--status-color);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 0.5rem;
  }

  .rfield-text {
    color: var(--text-color);
    font-size: 4em;     /* 0.88rem Г— (16Г·14) в‰€ 1 */
    line-height: 0.95;
    vertical-align: baseline;
  }

  .rfield-empty {
    color: var(--empty-color);
    font-size: 1em;     /* 0.88rem Г— (16Г·14) в‰€ 1 */
  }

  #random-dist {
    color: var(--dist-color);
    /* font-size: 0.89em;   */
    /* 0.78rem Г— (16Г·14) */
    /* margin-top: 0.5rem; */
    /* margin-bottom: 1.4rem; */
  }

  #random-another {
    background: none;
    border: 1px solid var(--btn-border);
    color: var(--fg);
    font-family: inherit;
    font-size: inherit;
    padding: 0.3rem 0.9rem;
    cursor: pointer;
    align-self: flex-start;
  }
  #random-another:hover { border-color: var(--fg); }

  #random-empty {
    color: var(--noresults-color);
    display: none;
  }

  @media (max-width: 639px) {
    #random-card { display: flex; }
    #table-wrap  { display: none; }
  }
</style>
</head>
<body>

<div id="top-bar">
  <div id="top-bar-head">
    <h1>Nebby: sniffing&nbsp;<button id="view-toggle">reports</button></h1>
    <div id="top-bar-head-right">
      <button id="theme-toggle" title="toggle light/dark">light</button>
    </div>
  </div>

  <div id="status">
    <span id="status-text">fetchingвЂ¦</span><span id="status-sep"> В· </span><select id="time-select">
      <option value="today">today</option>
      <option value="week" selected>last week</option>
      <option value="month">past month</option>
      <option value="3mo">past 3 months</option>
      <option value="6mo">past 6 months</option>
    </select>
  </div>

  <div id="controls-row">
    <div id="search-wrap">
      <input id="search-input" type="text" placeholder="search description / symptoms / commentsвЂ¦" autocomplete="off">
      <button id="clear-btn" title="clear search В· reset to this week">clear&nbsp;&nbsp;&nbsp;</button>
    </div>
    <form id="location-form" autocomplete="off">
      <input id="zip-input" type="text" placeholder="zip" maxlength="5" pattern="\d{5}">
      <input id="streets-input" type="text" placeholder="cross streets">
      <button type="submit">в†’</button>
    </form>
  </div>

</div>

<div id="table-wrap">
  <table id="report-table">
    <colgroup>
      <col class="col-idx">
      <col class="col-int">
      <col class="col-meta">
      <col class="col-desc">
      <col class="col-sym">
      <col class="col-com">
      <col class="col-dist">
    </colgroup>
    <thead>
      <tr>
        <th>#</th>
        <th data-sort="score">score</th>
        <th>zip В· time</th>
        <th class="col-desc" data-filter="description">description</th>
        <th class="col-sym"  data-filter="symptoms">symptoms</th>
        <th class="col-com"  data-filter="comments">comments</th>
        <th id="dist-header" class="col-dist" data-sort="dist" title="set location to sort by distance">dist</th>
      </tr>
    </thead>
    <tbody id="report-body"></tbody>
  </table>
  <div id="no-results">no reports with text found this week</div>
</div>

<div id="random-card">
  <div id="random-inner">
    <button id="random-another">в†є another</button>
    
    <div id="random-info">
      <span id="random-meta"></span>
      <span id="random-score"></span>
      <span id="random-dist"></span>
    </div>
    
    <div id="random-maintext">
      <div id="random-fields"></div>
      <div id="random-empty">no reports in current selection</div>
    </div>
    

  </div>
</div>

<script>
// в”Ђв”Ђ constants в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

const API_BASE = 'https://api.smellpittsburgh.org/api/v2';
const REGION_ID = 1; // Allegheny County

// visual marker only вЂ” not a hard filter
const SENTIMENT_RE = /\b(i|my|me|we|our|us|you|your|breath|breathing|breathe|lung|lungs|nose|throat|cough|coughing|wheeze|wheezing|asthma|chest|eyes?|skin|headache|nausea|nauseated|dizzy|dizziness|sick|burning|stinging|itchy|lightheaded|outside|inside|window|windows|door|doors|house|home)\b/i;

// в”Ђв”Ђ state в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

let userLat = null;
let userLng = null;
let cachedReports = [];
let sortField = 'time'; // 'time' | 'score' | 'dist'
let distActive = false;
let searchTerm = '';
let timeOption = 'week';
let viewMode = 'reports'; // 'reports' | 'random'

// в”Ђв”Ђ bar height в†’ CSS variable (drives sticky thead + table-wrap margin) в”Ђв”Ђв”Ђв”Ђ

function updateBarHeight() {
  const h = document.getElementById('top-bar').offsetHeight;
  document.documentElement.style.setProperty('--bar-height', h + 'px');
}
window.addEventListener('resize', updateBarHeight);
updateBarHeight();

// в”Ђв”Ђ theme toggle в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

const toggleBtn = document.getElementById('theme-toggle');
toggleBtn.addEventListener('click', () => {
  const isLight = document.body.classList.toggle('light');
  toggleBtn.textContent = isLight ? 'dark' : 'light';
});

// в”Ђв”Ђ utils в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

function haversine(lat1, lng1, lat2, lng2) {
  const R = 3958.8;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2
    + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180)
    * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function weekStart() {
  const now = new Date();
  const mon = new Date(now);
  mon.setDate(now.getDate() - ((now.getDay() + 6) % 7));
  mon.setHours(0, 0, 0, 0);
  return Math.floor(mon.getTime() / 1000);
}

function textOf(r) {
  return [r.smell_description, r.feelings_symptoms, r.additional_comments]
    .filter(Boolean).join(' ');
}

function smellDots(v) {
  return '<span class="cell-int">'
    + 'в—Џ'.repeat(v)
    + '<span class="empty">' + 'в—‹'.repeat(5 - v) + '</span>'
    + '</span>';
}

function smellDotsPlain(v) {
  return 'в—Џ'.repeat(v) + 'в—‹'.repeat(5 - v);
}

function fmtTime(unix) {
  return new Date(unix * 1000).toLocaleString('en-US', {
    month: 'short', day: 'numeric',
    hour: 'numeric', minute: '2-digit'
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function highlightText(raw, term) {
  const esc = escHtml(raw);
  if (!term) return esc;
  const safeTerm = escHtml(term).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return esc.replace(new RegExp(safeTerm, 'gi'), m => `<mark>${m}</mark>`);
}

function updateClearBtn() {
  const dirty = searchTerm !== '';  // || timeOption !== 'week';
  document.getElementById('clear-btn').style.display = dirty ? 'block' : 'none';
}

// в”Ђв”Ђ geocode в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

async function geocode(zip, streets) {
  const parts = [];
  if (streets) parts.push(streets.trim());
  parts.push('Pittsburgh, PA');
  if (zip) parts.push(zip);
  const q = parts.join(', ');
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&countrycodes=us`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`geocode error ${res.status}`);
  const data = await res.json();
  if (!data.length) throw new Error('location not found вЂ” include Ave / St (e.g. "Penn Ave, Negley Ave")');
  return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
}

// в”Ђв”Ђ fetch reports в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

async function loadReports() {
  const now = Math.floor(Date.now() / 1000);
  const starts = {
    today: now - 86400,
    week:  now - 7   * 86400,
    month: now - 30  * 86400,
    '3mo': now - 90  * 86400,
    '6mo': now - 180 * 86400,
  };
  const start = starts[timeOption] ?? starts.week;
  const url = `${API_BASE}/smell_reports?region_ids=${REGION_ID}&start_time=${start}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`API error ${res.status}`);
  const all = await res.json();
  return all
    .filter(r => textOf(r).length > 0)
    .sort((a, b) => b.observed_at - a.observed_at);
}

// в”Ђв”Ђ sort / filter в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

function sortedReports() {
  const rs = [...cachedReports];
  if (sortField === 'score') {
    rs.sort((a, b) => b.smell_value - a.smell_value);
  } else if (sortField === 'dist' && userLat !== null) {
    rs.sort((a, b) =>
      haversine(userLat, userLng, a.latitude, a.longitude) -
      haversine(userLat, userLng, b.latitude, b.longitude)
    );
  } else {
    rs.sort((a, b) => b.observed_at - a.observed_at);
  }
  return rs;
}

function filteredReports() {
  const rs = sortedReports();
  if (!searchTerm) return rs;
  const term = searchTerm.toLowerCase();
  return rs.filter(r =>
    [r.smell_description, r.feelings_symptoms, r.additional_comments]
      .some(f => f && f.toLowerCase().includes(term))
  );
}

function applySort() {
  const reports = filteredReports();
  renderTable(reports);
  const table = document.getElementById('report-table');
  table.classList.toggle('dist-visible', distActive);
  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.classList.toggle('sort-active', th.dataset.sort === sortField);
  });
  if (viewMode === 'random') renderRandomCard(reports);
  updateClearBtn();
}

// в”Ђв”Ђ status в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

function setStatus(msg, isError = false) {
  document.getElementById('status-text').textContent = msg;
  document.getElementById('status').className = isError ? 'error' : '';
  document.getElementById('status-sep').style.display = 'none';
  document.getElementById('time-select').style.display = 'none'; // hidden during loading/error; shown by setStatusCount
}

function setStatusCount(count) {
  document.getElementById('status-text').textContent =
    `${count} report${count !== 1 ? 's' : ''}`;
  document.getElementById('status').className = '';
  document.getElementById('status-sep').style.display = 'inline';
  document.getElementById('time-select').style.display = 'inline'; // revealed after data loads
}

// в”Ђв”Ђ render table в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

function renderTable(reports) {
  const tbody = document.getElementById('report-body');
  const noResults = document.getElementById('no-results');
  tbody.innerHTML = '';

  if (reports.length === 0) {
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  reports.forEach((r, i) => {
    const hasSentiment = SENTIMENT_RE.test(textOf(r));
    const dist = userLat !== null
      ? haversine(userLat, userLng, r.latitude, r.longitude).toFixed(1) + ' mi'
      : '';

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="cell-idx col-idx">${i + 1}${hasSentiment ? '<span class="sent-marker" title="personal language">В·</span>' : ''}</td>
      <td class="col-int" data-score="${r.smell_value}">${smellDots(r.smell_value)}</td>
      <td class="cell-meta col-meta">${escHtml(r.zipcode || 'вЂ”')}<br>${fmtTime(r.observed_at)}</td>
      <td class="col-desc">${r.smell_description  ? `<div class="cell-text">${highlightText(r.smell_description,  searchTerm)}</div>` : '<span class="cell-empty">вЂ”</span>'}</td>
      <td class="col-sym"> ${r.feelings_symptoms  ? `<div class="cell-text">${highlightText(r.feelings_symptoms,  searchTerm)}</div>` : '<span class="cell-empty">вЂ”</span>'}</td>
      <td class="col-com"> ${r.additional_comments ? `<div class="cell-text">${highlightText(r.additional_comments, searchTerm)}</div>` : '<span class="cell-empty">вЂ”</span>'}</td>
      <td class="cell-dist col-dist">${dist}</td>
    `;
    tbody.appendChild(tr);
  });
}

// в”Ђв”Ђ random card в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

function renderRandomCard(reports) {
  const card = document.getElementById('random-card');
  const emptyEl = document.getElementById('random-empty');
  const anotherBtn = document.getElementById('random-another');

  if (reports.length === 0) {
    document.getElementById('random-score').textContent = '';
    document.getElementById('random-meta').textContent = '';
    document.getElementById('random-fields').innerHTML = '';
    document.getElementById('random-dist').textContent = '';
    emptyEl.style.display = 'block';
    anotherBtn.style.display = 'none';
    return;
  }

  emptyEl.style.display = 'none';
  anotherBtn.style.display = '';

  const r = reports[Math.floor(Math.random() * reports.length)];

  // score
  const scoreEl = document.getElementById('random-score');
  scoreEl.innerHTML = smellDots(r.smell_value);

  // meta
  document.getElementById('random-meta').textContent =
    `${r.zipcode || 'вЂ”'} В· ${fmtTime(r.observed_at)}`;

  // fields
  const fieldsEl = document.getElementById('random-fields');
  fieldsEl.innerHTML = '';
  const fields = [
    { label: 'description', value: r.smell_description },
    { label: 'symptoms',    value: r.feelings_symptoms },
    { label: 'comments',    value: r.additional_comments },
  ];
  fieldsEl.innerHTML = fields
    .filter(({ value }) => value)
    .map(({ label, value }) =>
      `<div class="rfield"><span class="rfield-label">${label}</span><span class="rfield-text">${highlightText(value, searchTerm)}</span></div>`
    )
    .join('');

  // dist
  const distEl = document.getElementById('random-dist');
  if (userLat !== null) {
    const d = haversine(userLat, userLng, r.latitude, r.longitude).toFixed(1);
    distEl.textContent = `${d} mi away`;
  } else {
    distEl.textContent = '';
  }
}

// в”Ђв”Ђ view toggle в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

function setViewMode(mode) {
  viewMode = mode;
  const btn = document.getElementById('view-toggle');
  const tableWrap = document.getElementById('table-wrap');
  const randomCard = document.getElementById('random-card');

  btn.textContent = mode;

  if (mode === 'random') {
    tableWrap.style.display = 'none';
    randomCard.classList.add('active');
    renderRandomCard(filteredReports());
  } else {
    tableWrap.style.display = '';
    randomCard.classList.remove('active');
  }
}

document.getElementById('view-toggle').addEventListener('click', e => {
  e.currentTarget.blur();
  setViewMode(viewMode === 'reports' ? 'random' : 'reports');
});

document.getElementById('random-another').addEventListener('click', e => {
  e.currentTarget.blur();
  renderRandomCard(filteredReports());
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'r') {
    setViewMode(viewMode === 'reports' ? 'random' : 'reports');
  } else if (e.key === ' ' && viewMode === 'random') {
    e.preventDefault();
    renderRandomCard(filteredReports());
  }
});

// в”Ђв”Ђ filter в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

function toggleColumnFocus(filter) {
  const table = document.getElementById('report-table');
  table.classList.toggle(`dim-${filter}`);
}

// в”Ђв”Ђ init / refetch в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

const TIME_LABELS = {
  today: 'today', week: 'last week', month: 'this month',
  '3mo': 'past 3 months', '6mo': 'past 6 months',
};

async function refetch() {
  setStatus('fetchingвЂ¦');
  try {
    cachedReports = await loadReports();
    setStatusCount(cachedReports.length);
    applySort();
  } catch (e) {
    setStatus(e.message, true);
  }
}

async function init() {
  await refetch();
}

document.getElementById('location-form').addEventListener('submit', async e => {
  e.preventDefault();
  const zip = document.getElementById('zip-input').value.trim();
  const streets = document.getElementById('streets-input').value.trim();
  if (!zip) return;

  setStatus('locatingвЂ¦');
  try {
    const loc = await geocode(zip, streets);
    userLat = loc.lat;
    userLng = loc.lng;
    distActive = true;
    await refetch();
  } catch (e) {
    setStatus(e.message, true);
  }
});

document.getElementById('time-select').addEventListener('change', e => {
  timeOption = e.target.value;
  refetch();
});

document.getElementById('report-table').addEventListener('click', e => {
  const th = e.target.closest('th');
  if (!th) return;
  if (th.dataset.filter) {
    toggleColumnFocus(th.dataset.filter);
  } else if (th.dataset.sort === 'score') {
    sortField = sortField === 'score' ? 'time' : 'score';
    applySort();
  } else if (th.dataset.sort === 'dist') {
    if (userLat === null) { setStatus('set location first', true); return; }
    sortField = sortField === 'dist' ? 'time' : 'dist';
    applySort();
  }
});

document.getElementById('search-input').addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  applySort();
});

document.getElementById('clear-btn').addEventListener('click', () => {
  searchTerm = '';
  timeOption = 'week';
  document.getElementById('search-input').value = '';
  document.getElementById('time-select').value = 'week';
  refetch();
});

init();
</script>
