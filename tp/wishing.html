<!-- tiny are.na tool exploration -->
<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="icon" type="image/x-icon" href="favicon.ico">
      <title>are.nauting: wishing well</title>
      <script src="https://unpkg.com/typeit@8.7.1/dist/index.umd.js"></script>
      <style>
        :root { --bg: whitesmoke; --text: black; --muted: gray; }
        [data-theme="dark"] { --bg: black; --text: white; --muted: gray; }
        body {
          font-family:sans-serif;
          background-color:var(--bg);
          color:var(--text);
          max-width:50vw;
          margin:0 auto;
          transition: background-color 0.15s, color 0.15s;
        }
        h1, h2 { font-weight:normal }
        a, a:visited { color: hotpink }
        aside { margin-bottom:3em }
        aside * { color: var(--muted); }
        #theme-toggle {
          background:none; border:none; cursor:pointer;
          font-family:sans-serif; font-size:1em; color:var(--muted); padding:0;
        }
        #theme-toggle:hover { color:var(--text); }
      </style>
      <script>
        (function() {
          var saved = localStorage.getItem('arena-wishing-theme') ||
            (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          if (saved === 'dark') document.documentElement.dataset.theme = 'dark';
        })();
      </script>
  </head>
  <body>
    <h1>are.nauts: wishing well, <button id="theme-toggle">light</button></h1>
    <aside>
      <p>(Check out the <a href="https://www.are.na/block/19951165">founding block</a> motivating this webpage.)</p>
      <p>Think of a number and enter it here to find out if it is a key to something on Are.na.</p>
    </aside>

    <main>
      <div id="wishing-well">
    
        <input type="number" id="userNumInput" placeholder="enter an integer">
        <button id="userDone">search</button>

      </div>

      <div id="wellwater-surface">

        <p>
          <span id="fetchable"></span>
          <span id="urlVisitable"></span><a id="urlToVisit" href=""></a>
        </p>
        
        
        <p id="fetched-data"></p>

      </div>
    </main>


    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var isDark = document.documentElement.dataset.theme === 'dark';
        document.getElementById('theme-toggle').textContent = isDark ? 'dark' : 'light';
      });
      document.getElementById('theme-toggle').addEventListener('click', function() {
        var isDark = document.documentElement.dataset.theme === 'dark';
        document.documentElement.dataset.theme = isDark ? '' : 'dark';
        localStorage.setItem('arena-wishing-theme', isDark ? 'light' : 'dark');
        this.textContent = isDark ? 'light' : 'dark';
      });

      document.getElementById("userDone").addEventListener('click',prepBlock)


      async function prepBlock() {
        const currInputValue = document.getElementById("userNumInput").value;
        const blockFetchURL = `https://api.are.na/v3/blocks/${currInputValue}`;
        const blockURL = `https://are.na/block/${currInputValue}`;

        try {
          const response = await fetch(blockFetchURL);

          if (!response.ok) {
            document.getElementById("fetchable").innerText = `${response.status}, cannot access block; try again.`;
            document.getElementById("urlVisitable").innerText = "";
            document.getElementById("urlToVisit").href = "";
            document.getElementById("urlToVisit").innerHTML = "";
            throw new Error(`Response status: ${response.status}`);
          }

          const result = await response.json();
          document.getElementById("fetchable").innerText = "This block is publicly accessible!";
          document.getElementById("urlVisitable").innerText = " Visit it at ";
          document.getElementById("urlToVisit").href = blockURL;
          document.getElementById("urlToVisit").innerHTML = blockURL;
          
          // info about the block and its uploader
          const created = new Date(result.created_at).toLocaleString("en-US", {year: "numeric", month: "long", day: "numeric"});
          const updated = new Date(result.updated_at).toLocaleString("en-US", {year: "numeric", month: "long", day: "numeric"});
          
          const metadata = `It was created on ${created}\nand last modified on ${updated},\n\nby ${result.user.name} who is number ${result.user.id} in “line”`;
          document.getElementById("fetched-data").innerText = metadata;
          console.log(result);



        } catch (error) {
          console.error(error.message);
        }
      }
    </script>
    
  </body>
</html>
